name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-app:
    name: Tests (app crate)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run app unit tests (no OpenCL link on Windows)
        run: |
          cargo test -p app --lib gpu_
          cargo test -p app --lib panel_tuning

  build-miner-panel:
    name: Build miner-panel (no OpenCL link)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build GUI
        run: cargo build --release -p miner-panel

  build-linux-ocl:
    name: Build OpenCL miners (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-linux-ocl"
      - name: Install OpenCL dev (link libOpenCL)
        run: sudo apt-get update && sudo apt-get install -y ocl-icd-opencl-dev build-essential libgtk-3-dev libxcb-render0-dev libxkbcommon-dev libssl-dev
      - name: Build miners + fullnode
        run: cargo build --release --features ocl --bin poworker --bin diaworker --bin list_opencl --bin diagnose_opencl --bin hacash
      - name: Run app OpenCL unit tests
        run: cargo test -p app --lib --features ocl
      - name: Build miner-panel (Linux GUI)
        run: cargo build --release -p miner-panel
      - name: Run miner-panel integration tests
        run: cargo test -p miner-panel
      - name: Verify binaries
        run: |
          ls -la target/release/poworker target/release/diaworker target/release/list_opencl target/release/diagnose_opencl target/release/hacash target/release/miner-panel