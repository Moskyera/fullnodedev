; ============================================================================
; HACD diamond miner preset: ryzen7-rx9070xt
; CPU-only preset - OpenCL and CUDA are intentionally disabled
; Requires [diamondminer] enable = true in hacash.config.ini
; ============================================================================

connect = 127.0.0.1:8080
supervene = 14

[efficiency]
mode = profit
cpu_watts_per_thread = 8
dynamic_supervene = true
supervene_min = 1
supervene_max = 14
benchmark_seconds = 0

[gpu]
use_opencl = false
use_cuda = false
cpu_assist = false
