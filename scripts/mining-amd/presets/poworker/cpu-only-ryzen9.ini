; ============================================================================
; HAC block miner preset: cpu-only-ryzen9
; CPU: Ryzen 9 / 9950X CPU only (no AMD GPU)
; GPU: (none)
; No GPU mining — leave 2-4 threads for OS.
;
; Copy with: scripts\mining-amd\PICK-PRESET.bat
; Then set platform_id / device_ids (LIST-OPENCL-DEVICES.bat)
; ============================================================================

connect = 127.0.0.1:8080
; CPU threads for hybrid mining (supervene). TUNE script caps at 8 — ignore for high-end CPUs.
supervene = 20
nonce_max = 4294967295
notice_wait = 45

[gpu]
use_opencl = false
cpu_assist = false
platform_id = 0
device_ids = 0
opencl_dir = ../../x16rs/opencl/
debug = 0
