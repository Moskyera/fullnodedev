; ============================================================================
; HAC block miner preset: tr-7980x-rx7900xtx
; CPU: Threadripper 7980X / 9980WX (64+ cores)
; GPU: RX 7900 XTX (24 GB VRAM)
; Top TR — keep supervene at 20-24, not all threads.
;
; Copy with: scripts\mining-amd\PICK-PRESET.bat
; Then set platform_id / device_ids (LIST-OPENCL-DEVICES.bat)
; ============================================================================

connect = 127.0.0.1:8080
; CPU threads for hybrid mining (supervene). TUNE script caps at 8 — ignore for high-end CPUs.
supervene = 22
nonce_max = 4294967295
notice_wait = 45

[gpu]
use_opencl = true
cpu_assist = true
; Presets: amd_balanced | amd_performance | amd_max
gpu_profile = amd_max
platform_id = 0
device_ids = 0
opencl_dir = ../../x16rs/opencl/
work_groups = 4096
local_size = 256
unit_size = 128
debug = 0
